$schema: "http://json-schema.org/draft-07/schema#"
$id: feature-design
title: Feature Design
type: object
required:
  - $id
  - id
  - story
  - date
  - status
  - produced_by
  - intent
  - scope
  - risks
  - conclusions
additionalProperties: false
properties:
  $id:
    type: string
    enum: [feature-design]
  id:
    type: string
    pattern: "^SAIL-[0-9]{3}-design$"
  story:
    type: string
    pattern: "^SAIL-[0-9]{3}$"
  date:
    type: string
    format: date
  status:
    type: string
    enum: [draft, reviewed, approved]
  produced_by:
    type: string
    enum: [architect]

  intent:
    type: object
    required: [summary, user_value, success_criteria]
    additionalProperties: false
    properties:
      summary:
        type: string
        minLength: 10
      user_value:
        type: string
        description: Who benefits and how.
      success_criteria:
        type: array
        minItems: 1
        items:
          type: string

  scope:
    type: object
    required: [in, out]
    additionalProperties: false
    properties:
      in:
        type: array
        minItems: 1
        items:
          type: string
      out:
        type: array
        items:
          type: string

  risks:
    type: array
    items:
      type: object
      required: [id, description, severity, mitigation]
      additionalProperties: false
      properties:
        id:
          type: string
          pattern: "^R[0-9]+$"
        description:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        mitigation:
          type: string

  conclusions:
    type: object
    required: [approach, key_decisions]
    additionalProperties: false
    properties:
      approach:
        type: string
        description: Chosen implementation approach.
        minLength: 10
      key_decisions:
        type: array
        minItems: 1
        items:
          type: object
          required: [decision, rationale]
          additionalProperties: false
          properties:
            decision:
              type: string
            rationale:
              type: string
      deferred:
        type: array
        description: Decisions pushed to implementation phase.
        items:
          type: string

  implementation_notes:
    type: array
    description: Technical guidance for pi agent.
    items:
      type: string
